<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, "Segoe UI", sans-serif; background: #f3f5f8; color: #1c2230; }
    body { display: flex; flex-direction: column; }
    #head { padding: 8px 12px; font-weight: 700; font-size: 14px; background: #5aa02c; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    #langs { display: flex; gap: 4px; }
    #langs button { border: 1px solid rgba(255,255,255,.6); background: transparent; color: #fff; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 7px; cursor: pointer; }
    #langs button.active { background: #fff; color: #3c7018; }
    #msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 84%; padding: 8px 11px; border-radius: 14px; font-size: 13.5px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
    .msg.bot { align-self: flex-start; background: #fff; border: 1px solid #e2e6ec; border-bottom-left-radius: 4px; }
    .msg.user { align-self: flex-end; background: #5aa02c; color: #fff; border-bottom-right-radius: 4px; }
    .msg.typing { color: #8a93a6; font-style: italic; }
    #bar { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #e2e6ec; background: #fff; }
    #inp { flex: 1; padding: 9px 11px; border: 1px solid #cfd5dd; border-radius: 10px; font-size: 13.5px; outline: none; }
    #inp:focus { border-color: #5aa02c; }
    #send { border: none; background: #5aa02c; color: #fff; border-radius: 10px; padding: 0 14px; font-size: 15px; cursor: pointer; }
    #send:active { background: #4a8a24; }
    @media (prefers-color-scheme: dark) {
      html, body { background: #1a1f2b; color: #e6e9ef; }
      .msg.bot { background: #262c3a; border-color: #333a4a; }
      #bar { background: #222836; border-color: #333a4a; }
      #inp { background: #1a1f2b; color: #e6e9ef; border-color: #3a4254; }
    }
  </style>
</head>
<body>
  <div id="head">
    <span id="title">🐉 你的像素龙 · Claude</span>
    <span id="langs">
      <button data-l="en">EN</button><button data-l="zh">中</button><button data-l="es">ES</button>
    </span>
  </div>
  <div id="msgs"></div>
  <div id="bar">
    <input id="inp" placeholder="问我点什么…（Enter 发送）" autocomplete="off" />
    <button id="send">▶</button>
  </div>
  <script src="chat.js"></script>
</body>
</html>
